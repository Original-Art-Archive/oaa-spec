title: Original Art Archive Format
description: OAA is an open, portable archive format for original comic art collection data.

url: "https://original-art-archive.github.io"
baseurl: "/oaa-spec"

remote_theme: pages-themes/modernist@v0.2.0

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

include:
  - "**/.oacollection"
  - "**/.oaartwork"
  - "**/.oagallery"

defaults:
  - scope:
      path: "google*.html"
    values:
      sitemap: false
